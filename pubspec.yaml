name: systems_app
description: "This is the Department of Systems Engineering E-Library and Filling System."

publish_to: 'none' 

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.9.0
  flutter_svg: ^2.0.16
  mobkit_dashed_border: ^0.0.7
  animated_text_kit: ^4.2.2
  riverpod_generator: ^2.6.3
  flutter_riverpod: ^2.6.1
  build_runner: ^2.4.13
  firebase_auth: ^5.4.2
  riverpod_annotation: ^2.6.1
  cloud_firestore: ^5.6.3
  firebase_storage: ^12.4.2
  shimmer: ^3.0.0
  dropdown_search: ^6.0.2
  http: ^1.3.0
  cloud_functions: ^5.3.3
  file_picker: ^10.1.2
  flutter_dropzone: ^4.2.1
  path_provider: ^2.1.5
  dio: ^5.8.0+1
  universal_html: ^2.2.4
  cached_network_image: ^3.4.1
  shared_preferences: ^2.5.3
  image_network: ^2.6.0
  pdfx: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
  - family: KumbhSans
    fonts:
      - asset: assets/fonts/kumbh_sans/KumbhSans-Light.ttf  
      - asset: assets/fonts/kumbh_sans/KumbhSans-Regular.ttf
      - asset: assets/fonts/kumbh_sans/KumbhSans-Bold.ttf
